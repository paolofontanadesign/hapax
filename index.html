<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAPAX</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #00ff41;
    --dim: rgba(0,255,65,0.45);
    --bg: #000;
    --mono: 'Courier New', monospace;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: var(--mono);
  }

  #grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    width: 100vw;
    height: 100vh;
  }

  .cell {
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(0,255,65,0.2);
  }

  .cell iframe.feed {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  .cell canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  /* scanlines */
  .cell::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.18) 3px,
      rgba(0,0,0,0.18) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  #loading {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    color: var(--green);
    font-size: 13px;
    letter-spacing: 0.08em;
    gap: 16px;
  }

  #loading .blink { animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  #divider-h {
    position: fixed;
    top: 50%; left: 0; right: 0;
    height: 1px;
    background: rgba(0,255,65,0.35);
    pointer-events: none;
    z-index: 20;
  }
  #divider-v {
    position: fixed;
    left: 50%; top: 0; bottom: 0;
    width: 1px;
    background: rgba(0,255,65,0.35);
    pointer-events: none;
    z-index: 20;
  }
  #center-dot {
    position: fixed;
    top: 50%; left: 50%;
    width: 6px; height: 6px;
    margin: -3px 0 0 -3px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    pointer-events: none;
    z-index: 21;
  }
</style>
</head>
<body>

<div id="loading">
  <div>HAPAX // SURVEILLANCE NETWORK</div>
  <div id="load-status">ACQUIRING GPS COORDINATES<span class="blink">_</span></div>
</div>

<div id="grid"></div>
<div id="divider-h"></div>
<div id="divider-v"></div>
<div id="center-dot"></div>

<script>
const CHANNEL_COLORS = ['#00ff41','#00cfff','#ff9500','#ff3b6b'];

// ── BEARING ──────────────────────────────────────────────────────────────────
function bearing(fromLat, fromLon, toLat, toLon) {
  const f = Math.PI / 180;
  const dLon = (toLon - fromLon) * f;
  const lat1 = fromLat * f, lat2 = toLat * f;
  const y = Math.sin(dLon) * Math.cos(lat2);
  const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function distKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── DRAW OVERLAY ─────────────────────────────────────────────────────────────
function drawOverlay(canvas, webcam, userLat, userLon, color, idx) {
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  canvas.width = W; canvas.height = H;
  ctx.clearRect(0, 0, W, H);

  const loc = webcam.location || {};
  const camLat = loc.latitude ?? 0;
  const camLon = loc.longitude ?? 0;
  const br = bearing(camLat, camLon, userLat, userLon);
  const dist = distKm(camLat, camLon, userLat, userLon);

  // arrow direction from center toward bearing
  const cx = W / 2, cy = H / 2;
  const rad = br * Math.PI / 180;
  const reach = Math.min(W, H) * 0.36;

  const ex = cx + Math.sin(rad) * reach;
  const ey = cy - Math.cos(rad) * reach;

  // outer circle
  const R = Math.min(W, H) * 0.12;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.2;
  ctx.globalAlpha = 0.75;
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.stroke();

  // cross ticks
  const gap = R + 6, arm = 14;
  [[cx, cy-gap, cx, cy-gap-arm],[cx, cy+gap, cx, cy+gap+arm],
   [cx-gap, cy, cx-gap-arm, cy],[cx+gap, cy, cx+gap+arm, cy]].forEach(([x1,y1,x2,y2]) => {
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  });

  // center dot
  ctx.fillStyle = color;
  ctx.globalAlpha = 1;
  ctx.beginPath();
  ctx.arc(cx, cy, 2.5, 0, Math.PI*2);
  ctx.fill();

  // direction arrow
  ctx.globalAlpha = 0.9;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.lineTo(ex, ey);
  ctx.stroke();
  ctx.setLineDash([]);

  // arrowhead
  const headLen = 10;
  const a1 = rad + Math.PI - 0.4, a2 = rad + Math.PI + 0.4;
  ctx.beginPath();
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex + headLen * Math.sin(a1), ey - headLen * Math.cos(a1));
  ctx.moveTo(ex, ey);
  ctx.lineTo(ex + headLen * Math.sin(a2), ey - headLen * Math.cos(a2));
  ctx.stroke();

  // ── HUD text ───────────────────────────────────────────────────────────────
  ctx.globalAlpha = 0.85;
  ctx.fillStyle = color;
  ctx.font = `bold 10px 'Courier New', monospace`;

  const camTitle = (webcam.title || 'UNKNOWN').toUpperCase().slice(0, 28);
  const camCity  = (webcam.location.city || webcam.location.country || '???').toUpperCase();
  const status   = (webcam.status || 'ACTIVE').toUpperCase();
  const updated  = webcam.lastUpdatedOn ? String(webcam.lastUpdatedOn).replace('T',' ').slice(0,19) : '---';

  const lines = [
    `CH-0${idx+1} // ${camTitle}`,
    `CAM  LAT ${fmtCoord(camLat,'N','S')}  LON ${fmtCoord(camLon,'E','W')}`,
    `LOC  ${camCity}`,
    `USER LAT ${fmtCoord(userLat,'N','S')}  LON ${fmtCoord(userLon,'E','W')}`,
    `BRG  ${br.toFixed(2).padStart(6)}°   DIST ${dist.toFixed(1)} km`,
    `STAT ${status}   UPD ${updated}`,
  ];

  const lineH = 14;
  const padX = 10, padY = 10;
  const boxH = lines.length * lineH + 10;
  const boxW = 310;

  ctx.globalAlpha = 0.55;
  ctx.fillStyle = '#000';
  ctx.fillRect(padX, padY, boxW, boxH);

  ctx.globalAlpha = 0.9;
  ctx.fillStyle = color;
  lines.forEach((l, i) => ctx.fillText(l, padX + 6, padY + 14 + i * lineH));

  // corner brackets
  ctx.globalAlpha = 0.5;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  const bw = boxW, bh = boxH, bx = padX, by = padY, blen = 8;
  [[bx,by,1,0],[bx,by,0,1],[bx+bw,by,-1,0],[bx+bw,by,0,1],
   [bx,by+bh,1,0],[bx,by+bh,0,-1],[bx+bw,by+bh,-1,0],[bx+bw,by+bh,0,-1]].forEach(([x,y,dx,dy]) => {
    ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+dx*blen, y+dy*blen); ctx.stroke();
  });
}

function fmtCoord(val, pos, neg) {
  const d = Math.abs(val).toFixed(5);
  return `${val >= 0 ? pos : neg} ${d}`;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  setStatus('ACQUIRING GPS COORDINATES');
  let userLat, userLon;
  try {
    const pos = await new Promise((res, rej) =>
      navigator.geolocation.getCurrentPosition(res, rej, { timeout: 10000 }));
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;
  } catch(e) {
    setStatus('GPS DENIED — USING DEFAULT COORDS');
    userLat = 41.9028; userLon = 12.4964; // Roma fallback
    await sleep(1200);
  }

  setStatus(`COORDS ACQUIRED: ${fmtCoord(userLat,'N','S')} ${fmtCoord(userLon,'E','W')}`);
  await sleep(600);
  setStatus('QUERYING WINDY SURVEILLANCE NETWORK');

  let webcams;
  try {
    const r = await fetch(`/api/webcams?lat=${userLat}&lon=${userLon}`);
    const data = await r.json();
    webcams = (data.webcams || []).filter(w => w.status === 'active').slice(0, 4);
    if (!webcams.length) webcams = (data.webcams || []).slice(0, 4);
  } catch(e) {
    setStatus('NETWORK ERROR: ' + e.message);
    return;
  }

  if (!webcams.length) {
    setStatus('NO WEBCAMS FOUND IN RANGE');
    return;
  }

  setStatus(`${webcams.length} FEEDS ACQUIRED — INITIALIZING DISPLAY`);
  await sleep(500);

  document.getElementById('loading').style.display = 'none';
  buildGrid(webcams, userLat, userLon);
}

function buildGrid(webcams, userLat, userLon) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  webcams.forEach((wc, i) => {
    const color = CHANNEL_COLORS[i];
    const embedUrl = wc.player?.day || '';

    const cell = document.createElement('div');
    cell.className = 'cell';

    if (embedUrl) {
      const iframe = document.createElement('iframe');
      iframe.className = 'feed';
      iframe.src = embedUrl;
      iframe.allow = 'autoplay';
      iframe.setAttribute('allowfullscreen', '');
      cell.appendChild(iframe);
    } else {
      cell.style.background = '#080808';
    }

    const canvas = document.createElement('canvas');
    cell.appendChild(canvas);
    grid.appendChild(cell);

    // draw after layout
    requestAnimationFrame(() => drawOverlay(canvas, wc, userLat, userLon, color, i));
  });

  // redraw on resize
  window.addEventListener('resize', () => {
    document.querySelectorAll('.cell canvas').forEach((canvas, i) => {
      if (webcams[i]) drawOverlay(canvas, webcams[i], userLat, userLon, CHANNEL_COLORS[i], i);
    });
  });
}

function setStatus(msg) {
  const el = document.getElementById('load-status');
  if (el) el.innerHTML = msg + '<span class="blink">_</span>';
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

init();
</script>
</body>
</html>
