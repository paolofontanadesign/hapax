<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAPAX</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #00ff41;
    --dim: rgba(0,255,65,0.45);
    --bg: #000;
    --mono: 'Courier New', monospace;
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: var(--mono);
  }

  #grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    width: 100vw;
    height: 100vh;
  }

  .cell {
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(0,255,65,0.2);
  }

  .cell iframe.feed {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  .cell canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }


  /* scanlines */
  .cell::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.18) 3px,
      rgba(0,0,0,0.18) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  #loading {
    position: fixed;
    inset: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    color: var(--green);
    font-size: 13px;
    letter-spacing: 0.08em;
    gap: 16px;
  }

  #loading .blink { animation: blink 1s step-end infinite; }
  @keyframes blink { 50% { opacity: 0; } }

  #divider-h {
    position: fixed;
    top: 50%; left: 0; right: 0;
    height: 1px;
    background: rgba(0,255,65,0.35);
    pointer-events: none;
    z-index: 20;
  }
  #divider-v {
    position: fixed;
    left: 50%; top: 0; bottom: 0;
    width: 1px;
    background: rgba(0,255,65,0.35);
    pointer-events: none;
    z-index: 20;
  }
  #center-dot {
    position: fixed;
    top: 50%; left: 50%;
    width: 6px; height: 6px;
    margin: -3px 0 0 -3px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    pointer-events: none;
    z-index: 21;
  }
</style>
</head>
<body>

<div id="loading">
  <div>HAPAX // SURVEILLANCE NETWORK</div>
  <div id="load-status">ACQUIRING GPS COORDINATES<span class="blink">_</span></div>
</div>

<div id="grid"></div>
<div id="divider-h"></div>
<div id="divider-v"></div>
<div id="center-dot"></div>

<script>
const CHANNEL_COLORS = ['#00ff41','#00cfff','#ff9500','#ff3b6b'];

// ── PARSE CAMERA FACING FROM TITLE ───────────────────────────────────────────
function parseCameraFacing(title) {
  const t = title || '';
  const dirs = {
    'north-northeast': 22.5, 'nne': 22.5,
    'north-northeast': 22.5,
    'northeast': 45, 'north-east': 45, 'ne': 45,
    'east-northeast': 67.5, 'ene': 67.5,
    'east': 90,
    'east-southeast': 112.5, 'ese': 112.5,
    'southeast': 135, 'south-east': 135, 'se': 135,
    'south-southeast': 157.5, 'sse': 157.5,
    'south': 180,
    'south-southwest': 202.5, 'ssw': 202.5,
    'southwest': 225, 'south-west': 225, 'sw': 225,
    'west-southwest': 247.5, 'wsw': 247.5,
    'west': 270,
    'west-northwest': 292.5, 'wnw': 292.5,
    'northwest': 315, 'north-west': 315, 'nw': 315,
    'north-northwest': 337.5, 'nnw': 337.5,
    'north': 0,
  };
  // match "› South-west" or "› NE" patterns
  const m = t.match(/[›>]\s*([A-Za-z\-]+)/);
  if (m) {
    const key = m[1].toLowerCase().replace(/\s+/g, '-');
    if (key in dirs) return dirs[key];
  }
  return null; // unknown
}

// ── BEARING ──────────────────────────────────────────────────────────────────
function bearing(fromLat, fromLon, toLat, toLon) {
  const f = Math.PI / 180;
  const dLon = (toLon - fromLon) * f;
  const lat1 = fromLat * f, lat2 = toLat * f;
  const y = Math.sin(dLon) * Math.cos(lat2);
  const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function distKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ── DRAW OVERLAY ─────────────────────────────────────────────────────────────
function drawOverlay(canvas, webcam, userLat, userLon, color, idx) {
  const ctx = canvas.getContext('2d');
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  canvas.width = W; canvas.height = H;
  ctx.clearRect(0, 0, W, H);

  const loc = webcam.location || {};
  const camLat = loc.latitude ?? 0;
  const camLon = loc.longitude ?? 0;
  const br = bearing(camLat, camLon, userLat, userLon);
  const dist = distKm(camLat, camLon, userLat, userLon);

  // Calculate where user appears in this camera's frame
  const camFacing = parseCameraFacing(webcam.title);
  let bcx, bcy;
  if (camFacing !== null) {
    // relative bearing: how far left/right the user is from camera's view center
    let rel = br - camFacing;
    // normalize to -180..180
    rel = ((rel + 540) % 360) - 180;
    // map -90..+90 degrees to left/right of frame (beyond ±90 = off frame edge)
    const xFrac = Math.max(-0.5, Math.min(0.5, rel / 90 * 0.5));
    bcx = W / 2 + xFrac * W;
    bcy = H / 2; // vertical unknown, keep center
  } else {
    // no direction info: show at center
    bcx = W / 2;
    bcy = H / 2;
  }

  const bw = W * 0.22, bh = H * 0.30;
  const bx = bcx - bw / 2, by = bcy - bh / 2;
  const clen = 14; // corner bracket length

  // ── AI detection box ──────────────────────────────────────────────────────
  ctx.strokeStyle = color;
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.9;

  // corner brackets only (no full rect)
  const corners = [
    [bx,        by,        1, 0, 0, 1],
    [bx+bw,     by,       -1, 0, 0, 1],
    [bx,        by+bh,     1, 0, 0,-1],
    [bx+bw,     by+bh,    -1, 0, 0,-1],
  ];
  corners.forEach(([x, y, hx, hy, vx, vy]) => {
    ctx.beginPath();
    ctx.moveTo(x + hx * clen, y);
    ctx.lineTo(x, y);
    ctx.lineTo(x, y + vy * clen);
    ctx.stroke();
  });

  // dashed inner rect (faint)
  ctx.globalAlpha = 0.18;
  ctx.setLineDash([3, 5]);
  ctx.strokeRect(bx, by, bw, bh);
  ctx.setLineDash([]);
  ctx.globalAlpha = 0.9;

  // center crosshair inside box
  const csize = 6;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(bcx - csize, bcy); ctx.lineTo(bcx + csize, bcy);
  ctx.moveTo(bcx, bcy - csize); ctx.lineTo(bcx, bcy + csize);
  ctx.stroke();

  // label tag above box
  const label = `TARGET · ${br.toFixed(1)}° · ${dist.toFixed(0)}km`;
  ctx.font = `bold 9px 'Courier New', monospace`;
  const tw = ctx.measureText(label).width;
  ctx.globalAlpha = 0.7;
  ctx.fillStyle = '#000';
  ctx.fillRect(bx, by - 16, tw + 10, 14);
  ctx.globalAlpha = 1;
  ctx.fillStyle = color;
  ctx.fillText(label, bx + 5, by - 5);

  // confidence bar below box
  const conf = Math.max(20, Math.min(99, Math.round(100 - dist * 0.05)));
  const barW = bw;
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = color;
  ctx.fillRect(bx, by + bh + 2, barW, 3);
  ctx.globalAlpha = 0.8;
  ctx.fillRect(bx, by + bh + 2, barW * conf / 100, 3);
  ctx.globalAlpha = 0.7;
  ctx.font = `8px 'Courier New', monospace`;
  ctx.fillText(`CONF ${conf}%`, bx, by + bh + 14);

  // ── HUD info panel (bottom-left) ───────────────────────────────────────────
  ctx.globalAlpha = 0.85;
  ctx.fillStyle = color;
  ctx.font = `bold 9px 'Courier New', monospace`;

  const camTitle = (webcam.title || 'UNKNOWN').toUpperCase().slice(0, 30);
  const camCity  = (loc.city || loc.country || '???').toUpperCase();
  const updated  = webcam.lastUpdatedOn ? String(webcam.lastUpdatedOn).replace('T',' ').slice(0,19) : '---';

  const lines = [
    `CH-0${idx+1} // ${camTitle}`,
    `CAM  ${fmtCoord(camLat,'N','S')}  ${fmtCoord(camLon,'E','W')}`,
    `     ${camCity}`,
    `USER ${fmtCoord(userLat,'N','S')}  ${fmtCoord(userLon,'E','W')}`,
    `BRG  ${br.toFixed(2)}°   DIST ${dist.toFixed(1)} km`,
    `UPD  ${updated}`,
  ];

  const lineH = 13;
  const panelW = 290, panelH = lines.length * lineH + 10;
  const px = 0, py = 0;

  ctx.globalAlpha = 0.5;
  ctx.fillStyle = '#000';
  ctx.fillRect(px, py, panelW, panelH);

  // panel corner brackets
  ctx.globalAlpha = 0.6;
  ctx.strokeStyle = color;
  ctx.lineWidth = 1;
  const bl = 7;
  [[px,py,bl,0,0,bl],[px+panelW,py,-bl,0,0,bl],
   [px,py+panelH,bl,0,0,-bl],[px+panelW,py+panelH,-bl,0,0,-bl]].forEach(([x,y,dx1,dy1,dx2,dy2])=>{
    ctx.beginPath();
    ctx.moveTo(x+dx1,y+dy1); ctx.lineTo(x,y); ctx.lineTo(x+dx2,y+dy2);
    ctx.stroke();
  });

  ctx.globalAlpha = 0.9;
  ctx.fillStyle = color;
  lines.forEach((l, i) => ctx.fillText(l, px + 6, py + 13 + i * lineH));
}

function fmtCoord(val, pos, neg) {
  const d = Math.abs(val).toFixed(5);
  return `${val >= 0 ? pos : neg} ${d}`;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  setStatus('ACQUIRING GPS COORDINATES');
  let userLat, userLon;
  try {
    const pos = await new Promise((res, rej) =>
      navigator.geolocation.getCurrentPosition(res, rej, { timeout: 10000 }));
    userLat = pos.coords.latitude;
    userLon = pos.coords.longitude;
  } catch(e) {
    setStatus('GPS DENIED — USING DEFAULT COORDS');
    userLat = 41.9028; userLon = 12.4964; // Roma fallback
    await sleep(1200);
  }

  setStatus(`COORDS ACQUIRED: ${fmtCoord(userLat,'N','S')} ${fmtCoord(userLon,'E','W')}`);
  await sleep(600);
  setStatus('QUERYING WINDY SURVEILLANCE NETWORK');

  let webcams;
  try {
    const r = await fetch(`/api/webcams?lat=${userLat}&lon=${userLon}`);
    const data = await r.json();
    const active = (data.webcams || []).filter(w => w.status === 'active');
    const buckets = [
      { min: 0,   max: 5 },
      { min: 5,   max: 10 },
      { min: 10,  max: 50 },
      { min: 50,  max: 100 },
    ];
    webcams = buckets.map(({ min, max }) =>
      active.find(w => {
        const d = distKm(userLat, userLon, w.location?.latitude ?? 0, w.location?.longitude ?? 0);
        return d >= min && d < max;
      })
    ).filter(Boolean);
    if (!webcams.length) webcams = active.slice(0, 4);
  } catch(e) {
    setStatus('NETWORK ERROR: ' + e.message);
    return;
  }

  if (!webcams.length) {
    setStatus('NO WEBCAMS FOUND IN RANGE');
    return;
  }

  setStatus(`${webcams.length} FEEDS ACQUIRED — INITIALIZING DISPLAY`);
  await sleep(500);

  document.getElementById('loading').style.display = 'none';
  buildGrid(webcams, userLat, userLon);
}

function buildGrid(webcams, userLat, userLon) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  webcams.forEach((wc, i) => {
    const color = CHANNEL_COLORS[i];
    const embedUrl = wc.player?.day || '';

    const cell = document.createElement('div');
    cell.className = 'cell';

    if (embedUrl) {
      const iframe = document.createElement('iframe');
      iframe.className = 'feed';
      iframe.src = embedUrl;
      iframe.allow = 'autoplay';
      iframe.setAttribute('allowfullscreen', '');
      cell.appendChild(iframe);
    } else {
      cell.style.background = '#080808';
    }

    const canvas = document.createElement('canvas');
    cell.appendChild(canvas);
    grid.appendChild(cell);

    // draw after layout
    requestAnimationFrame(() => drawOverlay(canvas, wc, userLat, userLon, color, i));
  });

  // redraw on resize
  window.addEventListener('resize', () => {
    document.querySelectorAll('.cell canvas').forEach((canvas, i) => {
      if (webcams[i]) drawOverlay(canvas, webcams[i], userLat, userLon, CHANNEL_COLORS[i], i);
    });
  });
}

function setStatus(msg) {
  const el = document.getElementById('load-status');
  if (el) el.innerHTML = msg + '<span class="blink">_</span>';
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

init();
</script>
</body>
</html>
